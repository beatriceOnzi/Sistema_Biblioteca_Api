{% extends "layout/main.html" %}

{% block title %}Biblioteca CNEC{% endblock %}

{% block content %}
    <h1 class="text-3xl font-bold text-cnec-azul-escuro">
    Turma {{turma}}º Ano
    </h1>
    <div>
        {% for aluno in alunos_turma %}
            <ul>
                <li class="text-cnec-azul">{{aluno.nome}} - {{aluno.turma}}</li>
            </ul> 
        {% endfor %}

    </div>
{% endblock %}
