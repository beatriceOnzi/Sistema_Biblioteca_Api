{% extends "layout/main.html" %}

{% block title %}Biblioteca CNEC{% endblock %}

{% block content %}
    <h1 class="text-3xl font-bold text-cnec-azul-escuro sm:text-cnec-amarelo">
    Turma {{turma}}º Ano
    </h1>
    <div>
        <ul>
            {% for aluno in alunos_turma %}
                <li class="text-cnec-azul">
                    {{aluno.nome}} - {{aluno.turma}}º Ano
                </li>
            {% endfor %}
        </ul> 
    </div>

{% endblock %}
