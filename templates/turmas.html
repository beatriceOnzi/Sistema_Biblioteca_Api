{% extends "layout/main.html" %}

{% block title %}Biblioteca CNEC{% endblock %}

{% block content %}
    <h1 class="text-3xl font-bold text-cnec-azul-escuro">
    Turmas
    </h1>
    <div>
        {% for turma in turmas %} 
            <a href="/turma/{{turma.turma}}" class="text-cnec-azul">{{ turma.turma_formatada }}</a>
        {% endfor %}

    </div>
{% endblock %}
